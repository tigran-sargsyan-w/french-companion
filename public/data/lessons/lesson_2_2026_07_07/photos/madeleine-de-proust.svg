<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Une madeleine de Proust</title>
  <desc id="desc">Un goût, une odeur, une image ou un son déclenche un souvenir et une émotion.</desc>
  <rect width="1200" height="700" rx="36" fill="#f8f4ec"/>
  <text x="600" y="85" text-anchor="middle" font-family="Georgia, serif" font-size="53" font-weight="700" fill="#332a27">UNE MADELEINE DE PROUST</text>
  <text x="600" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" fill="#6b5b52">Une sensation fait revenir involontairement un souvenir.</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="70" y="235" width="285" height="225" rx="30" fill="#d8e7ef"/>
    <text x="212" y="305" font-size="30" font-weight="700" fill="#17324d">DÉCLENCHEUR</text>
    <text x="212" y="355" font-size="24" fill="#39556b">une odeur</text>
    <text x="212" y="390" font-size="24" fill="#39556b">un goût, un son</text>
    <text x="212" y="425" font-size="24" fill="#39556b">une image, un toucher</text>
    <rect x="458" y="235" width="285" height="225" rx="30" fill="#eadcc8"/>
    <text x="600" y="330" font-size="34" font-weight="700" fill="#17324d">SOUVENIR</text>
    <text x="600" y="380" font-size="24" fill="#39556b">une scène passée</text>
    <rect x="845" y="235" width="285" height="225" rx="30" fill="#edd1d4"/>
    <text x="987" y="330" font-size="34" font-weight="700" fill="#17324d">ÉMOTION</text>
    <text x="987" y="380" font-size="24" fill="#39556b">joie, tristesse</text>
    <text x="987" y="415" font-size="24" fill="#39556b">nostalgie…</text>
  </g>
  <g fill="#8b7769"><path d="M375 335 h58 l-18 -18 18 -18 55 48 -55 48 -18 -18 18 -18 h-58z"/><path d="M763 335 h58 l-18 -18 18 -18 55 48 -55 48 -18 -18 18 -18 h-58z"/></g>
  <rect x="120" y="535" width="960" height="95" rx="22" fill="#17324d"/>
  <text x="600" y="595" text-anchor="middle" font-family="Arial, sans-serif" font-size="29" fill="#ffffff">« L’odeur du pain chaud est ma madeleine de Proust. »</text>
</svg>
