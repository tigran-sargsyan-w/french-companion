<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="850" viewBox="0 0 1200 850" role="img" aria-labelledby="title desc">
  <title id="title">La fabrique des souvenirs</title>
  <desc id="desc">Les cinq sens peuvent déclencher des souvenirs.</desc>
  <rect width="1200" height="850" rx="36" fill="#f4eadc"/>
  <text x="600" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="54" font-weight="700" fill="#332a27">LA FABRIQUE DES SOUVENIRS</text>
  <text x="600" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#6b5b52">La mémoire se nourrit de nos sensations et de nos émotions.</text>
  <circle cx="600" cy="400" r="142" fill="#17324d"/>
  <text x="600" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">UN</text>
  <text x="600" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">SOUVENIR</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <circle cx="270" cy="270" r="105" fill="#d4e7ed"/><text x="270" y="260" font-size="36" font-weight="700" fill="#17324d">LA VUE</text><text x="270" y="300" font-size="24" fill="#39556b">voir</text>
    <circle cx="930" cy="270" r="105" fill="#f0d7c8"/><text x="930" y="260" font-size="36" font-weight="700" fill="#17324d">L’OUÏE</text><text x="930" y="300" font-size="24" fill="#39556b">entendre</text>
    <circle cx="205" cy="575" r="105" fill="#eee0ba"/><text x="205" y="565" font-size="36" font-weight="700" fill="#17324d">LE GOÛT</text><text x="205" y="605" font-size="24" fill="#39556b">goûter</text>
    <circle cx="600" cy="690" r="105" fill="#d9ded0"/><text x="600" y="680" font-size="34" font-weight="700" fill="#17324d">LE TOUCHER</text><text x="600" y="720" font-size="24" fill="#39556b">toucher</text>
    <circle cx="995" cy="575" r="105" fill="#e9c6c8"/><text x="995" y="565" font-size="34" font-weight="700" fill="#17324d">L’ODORAT</text><text x="995" y="605" font-size="24" fill="#39556b">sentir</text>
  </g>
  <g stroke="#8b7769" stroke-width="5" fill="none">
    <path d="M365 305 L470 350"/><path d="M835 305 L730 350"/><path d="M300 540 L470 460"/><path d="M600 585 L600 542"/><path d="M900 540 L730 460"/>
  </g>
</svg>
