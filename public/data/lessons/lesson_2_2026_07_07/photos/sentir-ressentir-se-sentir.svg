<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Sentir, ressentir et se sentir</title>
  <desc id="desc">Comparaison des trois constructions avec des exemples.</desc>
  <rect width="1200" height="820" rx="36" fill="#f5f0e8"/>
  <text x="600" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="54" font-weight="700" fill="#332a27">SENTIR, RESSENTIR, SE SENTIR</text>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="145" width="1060" height="170" rx="28" fill="#dcebf1"/>
    <text x="110" y="205" font-size="38" font-weight="700" fill="#17324d">sentir + nom</text>
    <text x="110" y="252" font-size="27" fill="#39556b">Percevoir une odeur ou une sensation physique.</text>
    <text x="750" y="238" font-size="29" font-style="italic" fill="#17324d">Je sens l’odeur du café.</text>
    <rect x="70" y="335" width="1060" height="170" rx="28" fill="#eee1c8"/>
    <text x="110" y="395" font-size="38" font-weight="700" fill="#17324d">ressentir + nom</text>
    <text x="110" y="442" font-size="27" fill="#39556b">Éprouver une émotion ou une sensation.</text>
    <text x="750" y="428" font-size="29" font-style="italic" fill="#17324d">Je ressens de la joie.</text>
    <rect x="70" y="525" width="1060" height="170" rx="28" fill="#ead4d5"/>
    <text x="110" y="585" font-size="38" font-weight="700" fill="#17324d">se sentir + adjectif</text>
    <text x="110" y="632" font-size="27" fill="#39556b">Décrire son état personnel.</text>
    <text x="750" y="618" font-size="29" font-style="italic" fill="#17324d">Je me sens heureux.</text>
  </g>
  <text x="600" y="758" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" fill="#6b5b52">Attention : « de la » dans « de la joie » est un article partitif.</text>
</svg>
